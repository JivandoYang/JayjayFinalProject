name: Web Selenium And API Testing
on:
  #Untuk menjalankan world secara manual
  workflow_dispatch:
  #jalankan saat pull
  # pull_request:
  #   branches: [ "main" ]
    
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0
    - name: Grant execute permission
      run: chmod +x gradlew
      
    # Menjalankan command cucumber untuk api testing
    - name: Run API Test
      run: ./gradlew apiTest
      
    # # Menajalankan command cucumber untuk menjalankan testing
    # - name: Run Selenium Web Test
    #   run: ./gradlew webTest
    
    # Buat hasil testing dalam bentuk laporan dalam folder reports
    - name: Upload Test Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: cucumber-report
        path: reports/
